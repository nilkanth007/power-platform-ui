<div class="page-header" style="display: flex; align-items: center; gap: 1rem;">
  <a routerLink="/environments" style="background: var(--surface-color); padding: 0.5rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m15 18-6-6 6-6"/>
    </svg>
  </a>
  <div>
    <h1 class="page-title">Flows</h1>
    <p class="page-subtitle">Environment: {{ envId }}</p>
  </div>
</div>

<div *ngIf="isLoading" class="spinner"></div>

<div *ngIf="error" class="card" style="border-color: #ef4444; color: #fca5a5;">
  {{ error }}
</div>

<div class="grid" *ngIf="!isLoading && !error">
  <div *ngIf="flows.length === 0" style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-muted);">
    No flows found in this environment.
  </div>

  <a *ngFor="let flow of flows" [routerLink]="['/flow-definition', envId, flow.flowId]" class="card">
    <h3 style="margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between;">
      {{ flow.flowName || 'Unnamed Flow' }}
      <span class="badge" [style.background-color]="flow.state === 'Started' ? '#10b981' : '#6b7280'">
        {{ flow.state }}
      </span>
    </h3>
    <p style="color: var(--text-muted); font-size: 0.875rem;">
      ID: {{ flow.flowId }}
    </p>
  </a>
</div>
